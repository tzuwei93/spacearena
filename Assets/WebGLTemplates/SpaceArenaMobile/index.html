<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#050814">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="stylesheet" href="TemplateData/style.css">
  </head>
  <body>
    <main id="unity-shell">
      <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        <div id="unity-loading-bar" aria-live="polite">
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>
        <div id="unity-warning"></div>
      </div>
    </main>
    <script>
      const canvas = document.querySelector("#unity-canvas");
      const container = document.querySelector("#unity-container");

      function updateViewportSize() {
        const viewport = window.visualViewport;
        const width = Math.round(viewport ? viewport.width : window.innerWidth);
        const height = Math.round(viewport ? viewport.height : window.innerHeight);
        document.documentElement.style.setProperty("--app-width", width + "px");
        document.documentElement.style.setProperty("--app-height", height + "px");
        container.style.width = width + "px";
        container.style.height = height + "px";
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
      }

      window.addEventListener("resize", updateViewportSize, { passive: true });
      window.addEventListener("orientationchange", updateViewportSize, { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", updateViewportSize, { passive: true });
        window.visualViewport.addEventListener("scroll", updateViewportSize, { passive: true });
      }
      updateViewportSize();

      function unityShowBanner(msg, type) {
        const warningBanner = document.querySelector("#unity-warning");
        const div = document.createElement("div");
        div.textContent = msg;
        div.className = type === "error" ? "unity-error" : "unity-warning";
        warningBanner.appendChild(div);
        warningBanner.style.display = "block";
        if (type !== "error") {
          setTimeout(() => {
            warningBanner.removeChild(div);
            warningBanner.style.display = warningBanner.children.length ? "block" : "none";
          }, 5000);
        }
      }

      const buildUrl = "Build";
      const loaderUrl = buildUrl + "/{{{ LOADER_FILENAME }}}";
      const config = {
        arguments: [],
        dataUrl: buildUrl + "/{{{ DATA_FILENAME }}}",
        frameworkUrl: buildUrl + "/{{{ FRAMEWORK_FILENAME }}}",
        codeUrl: buildUrl + "/{{{ CODE_FILENAME }}}",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "{{{ COMPANY_NAME }}}",
        productName: "{{{ PRODUCT_NAME }}}",
        productVersion: "{{{ PRODUCT_VERSION }}}",
        showBanner: unityShowBanner
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        config.devicePixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      }

      document.querySelector("#unity-loading-bar").style.display = "block";

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        updateViewportSize();
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = (100 * progress) + "%";
        }).then(() => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          updateViewportSize();
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
